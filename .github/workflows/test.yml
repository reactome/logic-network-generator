name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'

    - name: Install Poetry
      run: pip install poetry

    - name: Install dependencies
      run: poetry install

    - name: Run unit tests (no Neo4j, no generated artifacts)
      run: poetry run pytest tests/ -v -m "not database and not integration"

    - name: Run type checking
      run: poetry run mypy --ignore-missing-imports src/
      continue-on-error: true  # Don't fail build yet
