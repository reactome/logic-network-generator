version: '3.8'

services:
  neo4j:
    image: public.ecr.aws/reactome/graphdb:Release94
    container_name: reactome-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_dbms_memory_heap_maxSize=8g
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
